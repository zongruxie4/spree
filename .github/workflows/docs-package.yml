name: Docs Package

on:
  push:
    branches: [main]
    paths:
      - "docs/developer/**"
      - "docs/api-reference/**"
      - "docs/integrations/**"
      - "packages/docs/**"
  pull_request:
    paths:
      - "docs/developer/**"
      - "docs/api-reference/**"
      - "docs/integrations/**"
      - "packages/docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @spree/docs build

      - name: Verify output
        run: |
          FILE_COUNT=$(find packages/docs/dist -name "*.md" | wc -l)
          echo "Built $FILE_COUNT markdown files"
          if [ "$FILE_COUNT" -lt 100 ]; then
            echo "Expected at least 100 files, got $FILE_COUNT"
            exit 1
          fi

  release:
    name: "Release"
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: packages/docs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Upgrade npm for Trusted Publishing support
        run: npm install -g npm@latest
        working-directory: .

      - name: Auto-bump patch version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @spree/docs version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            npm version patch --no-git-tag-version
            echo "Bumped from $CURRENT to $(node -p "require('./package.json').version")"
          else
            echo "Current version $CURRENT not yet published, using as-is"
          fi

      - name: Build and Publish
        run: node scripts/build.js && npm publish --provenance --access public
