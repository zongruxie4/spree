          content:
            application/json:
              example:
                error:
                  code: record_not_found
                  message: Address not found
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
  "/api/v3/store/customer/addresses/{id}/mark_as_default":
    patch:
      summary: Mark address as default
      tags:
      - Customers
      security:
      - api_key: []
        bearer_auth: []
      description: Sets the address as the default billing or shipping address for
        the customer
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const address = await client.customer.addresses.markAsDefault('addr_abc123', 'billing', {
            bearerToken: '<token>',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: address marked as default
          content:
            application/json:
              example:
                id: addr_EfhxLZ9ck8
                first_name: John
                last_name: Doe
                full_name: John Doe
                address1: 30 Lovely Street
                address2: Northwest
                postal_code: '35005'
                city: Herndon
                phone: 555-555-0199
                company: Company
                country_name: NAME_10
                country_iso: I10
                state_text: STATE_ABBR_28
                state_abbr: STATE_ABBR_28
                quick_checkout: false
                state_name: STATE_NAME_28
              schema:
                "$ref": "#/components/schemas/Address"
        '422':
          description: invalid kind parameter
          content:
            application/json:
              example:
                error:
                  code: invalid_request
                  message: kind must be billing or shipping
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '404':
          description: address not found
          content:
            application/json:
              example:
                error:
                  code: record_not_found
                  message: Address not found
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: string
                  enum:
                  - billing
                  - shipping
                  example: billing
                  description: 'Address kind: billing or shipping'
              required:
              - kind
  "/api/v3/store/auth/login":
    post:
      summary: Login
      tags:
      - Authentication
      security:
      - api_key: []
      description: Authenticates a customer with email/password and returns a JWT
        token
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const auth = await client.auth.login({
            email: 'customer@example.com',
            password: 'password123',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: login successful
          content:
            application/json:
              example:
                token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoxLCJ1c2VyX3R5cGUiOiJjdXN0b21lciIsImp0aSI6IjQ2NWE2MzFlLWFlOGItNDE5ZC1iOWZiLWJiNDI4NzIwODZiNyIsImlzcyI6InNwcmVlIiwiYXVkIjoic3RvcmVfYXBpIiwiZXhwIjoxNzczOTM4NTIwfQ.sanw0VZonZo8pA_sODPMs6PIL7AVSkTNiqjzNcBJRqU
                refresh_token: 1ZnWLivcEC7dLpCy1kgs8UQe
                user:
                  id: cus_UkLWZg9DAJ
                  email: test@example.com
                  first_name: Yen
                  last_name: Torp
                  phone:
                  accepts_email_marketing: false
                  created_at: '2026-03-19T15:42:00.088Z'
                  updated_at: '2026-03-19T15:42:00.088Z'
                  addresses: []
                  default_billing_address:
                  default_shipping_address:
              schema:
                "$ref": "#/components/schemas/AuthResponse"
        '401':
          description: missing API key
          content:
            application/json:
              example:
                error:
                  code: invalid_token
                  message: Valid API key required
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  example: email
                  description: 'Authentication provider (default: email)'
                email:
                  type: string
                  format: email
                  example: customer@example.com
                password:
                  type: string
                  example: password123
              required:
              - email
              - password
  "/api/v3/store/auth/refresh":
    post:
      summary: Refresh token
      tags:
      - Authentication
      security:
      - api_key: []
      description: Exchanges a refresh token for a new access JWT and rotated refresh
        token. No Authorization header needed.
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const auth = await client.auth.refresh({
            refresh_token: 'rt_xxx',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: token refreshed
          content:
            application/json:
              example:
                token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoxLCJ1c2VyX3R5cGUiOiJjdXN0b21lciIsImp0aSI6IjUzZDFjZGQ4LTcwYzQtNDc2My05MGRlLWZmNjg2MWMzZWE5MSIsImlzcyI6InNwcmVlIiwiYXVkIjoic3RvcmVfYXBpIiwiZXhwIjoxNzczOTM4NTIxfQ.AmJ_gpZXRxphEfIwkkI9ghps0oSjeA-95GV6g6zuwz4
                refresh_token: YfngjQmiHd5uHGrPGXDokFJF
                user:
                  id: cus_UkLWZg9DAJ
                  email: test@example.com
                  first_name: Hiedi
                  last_name: Marks
                  phone:
                  accepts_email_marketing: false
                  created_at: '2026-03-19T15:42:01.468Z'
                  updated_at: '2026-03-19T15:42:01.468Z'
                  addresses: []
                  default_billing_address:
                  default_shipping_address:
              schema:
                "$ref": "#/components/schemas/AuthResponse"
        '401':
          description: missing or invalid refresh token
          content:
            application/json:
              example:
                error:
                  code: invalid_refresh_token
                  message: Invalid or expired refresh token
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: Refresh token from login response
              required:
              - refresh_token
