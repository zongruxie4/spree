          content:
            application/json:
              example:
                id: addr_EfhxLZ9ck8
                first_name: John
                last_name: Doe
                full_name: John Doe
                address1: 21 Lovely Street
                address2: Northwest
                postal_code: '35005'
                city: Los Angeles
                phone: 555-555-0199
                company: Company
                country_name: NAME_7
                country_iso: I7
                state_text: STATE_ABBR_19
                state_abbr: STATE_ABBR_19
                quick_checkout: false
                state_name: STATE_NAME_19
              schema:
                "$ref": "#/components/schemas/Address"
      requestBody:
        content:
          application/json:
