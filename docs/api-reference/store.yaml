      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: login successful
          content:
            application/json:
              example:
                token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoxLCJ1c2VyX3R5cGUiOiJjdXN0b21lciIsImp0aSI6IjA2MjgxZDNhLTY0MDMtNDAzOS05OTRkLTE2ZDhjOTBhMGQ3OSIsImlzcyI6InNwcmVlIiwiYXVkIjoic3RvcmVfYXBpIiwiZXhwIjoxNzczNzQ5MzQwfQ.Kl9askzK2lIUX6EE9vvhHWyHaquHkZ_sc6BZxGiCZQo
